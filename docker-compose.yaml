services:
    zipkin-server:
        image: openzipkin/zipkin:3.5.1
        ports:
            - "9411:9411"
        restart: always
        networks:
            - curso-spring-network

    naming-server:
        image: douglasmodolo/naming-server:latest
        ports:
            - "8761:8761"
        depends_on:
            - zipkin-server
        networks:
            - curso-spring-network
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
            interval: 10s
            timeout: 5s
            retries: 5
    
    api-gateway:
        image: douglasmodolo/api-gateway:latest
        ports:
            - "8765:8765"
        depends_on:
            - zipkin-server
            - naming-server
        environment:
            SPRING_ZIPKIN_BASEURL: http://zipkin-server:9411
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
        networks:
            - curso-spring-network

    exchange-db:
        image: mysql:9.3.0
        restart: always
        environment:
            TZ: "America/Sao_Paulo"
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: exchange_service
            MYSQL_USER: docker
            MYSQL_PASSWORD: docker
        ports:
            - "3308:3306" # 3308 no host e 3306 no container
        networks:
            - curso-spring-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
            interval: 10s
            timeout: 5s
            retries: 5            

    exchange-service:
        image: douglasmodolo/exchange-service:latest
        restart: always
        build:
            context: ./exchange-service
            dockerfile: Dockerfile
        environment:
            TZ: "America/Sao_Paulo"
            SPRING_ZIPKIN_BASEURL: http://zipkin-server:9411
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
            SPRING_DATASOURCE_URL: jdbc:mysql://exchange-db:3306/exchange_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&enableTLSProtocols=TLSv1.2
            SPRING_DATASOURCE_USERNAME: docker
            SPRING_DATASOURCE_PASSWORD: docker
        depends_on:
            exchange-db:
                condition: service_healthy
            naming-server:
                condition: service_healthy
            zipkin-server:
                condition: service_started
        ports:
            - "8000:8000"
        networks:
            - curso-spring-network

    book-db:
        image: mysql:9.3.0
        restart: always
        environment:
            TZ: "America/Sao_Paulo"
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: book_service
            MYSQL_USER: docker
            MYSQL_PASSWORD: docker
        ports:
            - "3310:3306" # 3310 no host e 3306 no container
        networks:
            - curso-spring-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
            interval: 10s
            timeout: 5s
            retries: 5          

    book-service:
        image: douglasmodolo/book-service:latest
        restart: always
        build:
            context: ./book-service
            dockerfile: Dockerfile
        environment:
            TZ: "America/Sao_Paulo"
            SPRING_ZIPKIN_BASEURL: http://zipkin-server:9411
            EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
            SPRING_DATASOURCE_URL: jdbc:mysql://book-db:3306/book_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&enableTLSProtocols=TLSv1.2
            SPRING_DATASOURCE_USERNAME: docker
            SPRING_DATASOURCE_PASSWORD: docker
        depends_on:
            book-db:
                condition: service_healthy
            naming-server:
                condition: service_healthy
            zipkin-server:
                condition: service_started
        ports:
            - "8100:8100"
        networks:
            - curso-spring-network
    

networks:
    curso-spring-network:
        name: curso-spring-network
        driver: bridge